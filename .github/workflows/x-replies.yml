name: X reply agent

on:
  schedule:
    # 12:30 and 18:00 IST = 07:00 and 12:30 UTC
    - cron: "0 7 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-replies
  cancel-in-progress: false

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install twitter-api-v2 --no-save --no-audit --no-fund
      - name: Run reply agent
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TWITTERAPIIO_KEY: ${{ secrets.TWITTERAPIIO_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/x-reply-agent.mjs
      - name: Commit reply log
        run: |
          git config user.name "campaign-bot"
          git config user.email "bot@ruchitdalwadi.com"
          git add distribution
          git diff --cached --quiet || git commit -m "campaign: reply agent run $(date -u +%Y-%m-%dT%H:%M)"
          git push
