name: X engagement agents

on:
  schedule:
    # inbound answers: 12:30 and 18:00 IST = 07:00 and 12:30 UTC
    - cron: "0 7 * * *"
    - cron: "30 12 * * *"
    # trend post: 16:00 IST = 10:30 UTC
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent (inbound | trend | both)"
        required: false
        default: "both"

permissions:
  contents: write

concurrency:
  group: x-engagement
  cancel-in-progress: false

jobs:
  engage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install twitter-api-v2 --no-save --no-audit --no-fund
      - name: Inbound engagement agent
        if: github.event.schedule != '30 10 * * *' && github.event.inputs.agent != 'trend'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TWITTERAPIIO_KEY: ${{ secrets.TWITTERAPIIO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/x-inbound-agent.mjs
      - name: Trend post agent
        if: github.event.schedule == '30 10 * * *' || github.event.inputs.agent == 'trend' || github.event.inputs.agent == 'both'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TWITTERAPIIO_KEY: ${{ secrets.TWITTERAPIIO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/x-trend-post.mjs
      - name: Commit logs
        run: |
          git config user.name "campaign-bot"
          git config user.email "bot@ruchitdalwadi.com"
          git add distribution
          if ! git diff --cached --quiet; then
            git commit -m "campaign: engagement agents run $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase
            git push
          fi
