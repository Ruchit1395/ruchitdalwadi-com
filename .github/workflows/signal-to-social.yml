name: Signal to social

on:
  schedule:
    - cron: "15 4 * * *" # 09:45 IST — after Signal's 03:00 UTC (08:30 IST) run
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: signal-to-social
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate today's Signal-grounded X + LI posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SIGNAL_REPO_TOKEN: ${{ secrets.SIGNAL_REPO_TOKEN }}
        run: node scripts/signal-to-social.mjs --write
      - name: Commit into the content bank
        run: |
          git config user.name "campaign-bot"
          git config user.email "bot@ruchitdalwadi.com"
          git add content-bank
          if ! git diff --cached --quiet; then
            git commit -m "campaign: signal-grounded posts $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
