name: Campaign intelligence

on:
  schedule:
    - cron: "0 3 * * *" # 08:30 IST daily — trend radar
    - cron: "0 4 * * 0" # 09:30 IST Sundays — target-200 refresh
  workflow_dispatch:
    inputs:
      job:
        description: "radar | targets | both"
        required: false
        default: "both"

permissions:
  contents: write

concurrency:
  group: intelligence
  cancel-in-progress: false

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Trend radar
        if: github.event.schedule == '0 3 * * *' || github.event.inputs.job == 'radar' || github.event.inputs.job == 'both'
        env:
          TWITTERAPIIO_KEY: ${{ secrets.TWITTERAPIIO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/trend-radar.mjs
      - name: Target-200 refresh
        if: github.event.schedule == '0 4 * * 0' || github.event.inputs.job == 'targets' || github.event.inputs.job == 'both'
        env:
          TWITTERAPIIO_KEY: ${{ secrets.TWITTERAPIIO_KEY }}
        run: node scripts/build-target-list.mjs
      - name: Commit intelligence
        run: |
          git config user.name "campaign-bot"
          git config user.email "bot@ruchitdalwadi.com"
          git add distribution
          if ! git diff --cached --quiet; then
            git commit -m "campaign: intelligence refresh $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
